name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # --extra cpu pins the CPU torch wheel (fast; the default Linux wheel is the
      # large CUDA build). --frozen requires uv.lock to be in sync with pyproject.
      - name: Run tests
        run: uv run --frozen --extra cpu --extra data --extra launch pytest
