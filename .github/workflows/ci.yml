name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # CPU-only torch: the default PyPI wheel is the (large) CUDA build, which
      # is pointless on a CPU runner and slow to download.
      - name: Install CPU torch
        run: pip install "torch>=2.4" --index-url https://download.pytorch.org/whl/cpu

      - name: Install package + test extras
        run: pip install -e ".[dev,data,launch]"

      - name: Run tests
        run: pytest -q
